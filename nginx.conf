server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para los assets con hash de Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
